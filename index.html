<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Pacientes — Clínica Sucelso</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .card h1{font-size:18px;margin-bottom:6px}
        #msg{color:green;margin-top:12px}
    </style>
</head>
<body>
    <div class="login-page">
        <main class="card">
            <h1>Cadastro de Pacientes</h1>
            <p class="lead">Se Cadastre Aqui</p>

            <form id="cadastroForm" class="login-form" action="#" novalidate>
                <label for="nome">Nome completo</label>
                <input id="nome" name="nome" type="text" placeholder="Nome completo" required>

                <label for="telefone">Telefone</label>
                <input id="telefone" name="telefone" type="tel" placeholder="(00) 9XXXX-XXXX">

                <label for="email">E-mail</label>
                <input id="email" name="email" type="email" placeholder="seu@exemplo.com" required>

                <button type="submit" class="btn">Cadastrar</button>
            </form>

            <p id="msg" class="signup" aria-live="polite"></p>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
